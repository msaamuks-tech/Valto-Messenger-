<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Valto Chat</title>

<link rel="stylesheet" href="css/chat.css">

</head>


<body>


<div class="app">


<aside class="sidebar">

<h1>
Valto
</h1>

<div class="search">
🔍 Поиск
</div>


<div class="chat-list">


<div class="chat-item active">

<div class="avatar">
A
</div>

<div class="chat-info">

<h3>
Alex
</h3>

<p>
Привет 👋
</p>

</div>

<span class="time">
12:45
</span>

</div>



<div class="chat-item">

<div class="avatar">
M
</div>

<div class="chat-info">

<h3>
Max
</h3>

<p>
Как дела?
</p>

</div>

<span class="time">
11:20
</span>

</div>



<div class="chat-item">

<div class="avatar">
D
</div>

<div class="chat-info">

<h3>
Diana
</h3>

<p>
Фото 📷
</p>

</div>

<span class="time">
09:15
</span>

</div>


</div>


</aside>



<section class="conversation">


<header class="glass">

<div class="avatar">
A
</div>

<div>

<b>
Alex
</b>

<span>
🟢 Онлайн
</span>

</div>

</header>



<div class="messages">


<div class="message incoming">

<p>
Привет! 👋
</p>

<span>
12:40
</span>

</div>



<div class="message outgoing">

<p>
Привет! Это новый Valto 🔥
</p>

<span>
12:41
</span>

</div>



<div class="message incoming">

<p>
Очень красиво получается 🚀
</p>

<span>
12:42
</span>

</div>


</div>



<footer class="composer glass">


<button class="icon">
😊
</button>


<button class="icon">
📎
</button>


<input placeholder="Сообщение...">


<button class="send">
➤
</button>


</footer>


</section>


</div>


</body>

</html>
