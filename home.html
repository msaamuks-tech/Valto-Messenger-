<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valto</title>

  <link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/glass.css">
  <link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="app">

  <header class="topbar">

    <div>
    <h1>Valto</h1>
<p id="welcome">Добрый вечер 👋</p>
     <p id="status">Ваши сообщения и контакты</p>
    </div>

    <div class="profile">
      👤
    </div>

  </header>


  <div class="search">

    <input
      type="text"
      placeholder="Поиск">

  </div>
<div class="background-orb orb1"></div>
<div class="background-orb orb2"></div>

  <h2 class="section-title">
    Закреплённые
  </h2>


  <div class="stories">

    <div class="story">
      <div class="avatar">A</div>
      <span>Alex</span>
    </div>

    <div class="story">
      <div class="avatar">M</div>
      <span>Max</span>
    </div>

    <div class="story">
      <div class="avatar">D</div>
      <span>Diana</span>
    </div>

  </div>


  <h2 class="section-title">
    Сообщения
  </h2>


  <div class="chat-list">

<a href="chat.html?user=Alex" class="chat">

      <div class="avatar">
        A
      </div>

      <div class="chat-info">

        <h3>Alex</h3>

        <p>Привет 👋</p>

      </div>

      <span>12:45</span>

  </a>


  <a href="chat.html?user=Max" class="chat">

      <div class="avatar">
        M
      </div>

      <div class="chat-info">

        <h3>Max</h3>

        <p>Как дела?</p>

      </div>

      <span>11:20</span>

    </a>


    <a href="chat.html?user=Diana" class="chat">

      <div class="avatar">
        D
      </div>

      <div class="chat-info">

        <h3>Diana</h3>

        <p>Фото 📷</p>

      </div>

      <span>09:15</span>

    </a>

  </div>

</div>
  </main>

<nav class="dock">

    <a href="home.html" class="dock-item active">
        <i class="fa-solid fa-comments"></i>
        <span>Чаты</span>
    </a>

    <a href="#" class="dock-item">
        <i class="fa-solid fa-user-group"></i>
        <span>Контакты</span>
    </a>

    <a href="#" class="dock-item add">
        ＋
    </a>

    <a href="#" class="dock-item">
        <i class="fa-solid fa-bell"></i>
        <span>Уведомления</span>
    </a>

   <a href="profile.html" class="dock-item">
    <i class="fa-solid fa-user"></i>
    <span>Профиль</span>
</a>

</nav>
  <script src="js/home.js"></script>
</body>
</html>
