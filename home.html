<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valto</title>

  <link rel="stylesheet" href="css/home.css">
</head>

<body>

<div class="app">

  <header class="topbar">

    <div>
      <h1>Valto</h1>
      <p>Добрый вечер 👋</p>
    </div>

    <div class="profile">
      👤
    </div>

  </header>


  <div class="search">

    <input
      type="text"
      placeholder="Поиск">

  </div>


  <h2 class="section-title">
    Закреплённые
  </h2>


  <div class="stories">

    <div class="story">
      <div class="avatar">A</div>
      <span>Alex</span>
    </div>

    <div class="story">
      <div class="avatar">M</div>
      <span>Max</span>
    </div>

    <div class="story">
      <div class="avatar">D</div>
      <span>Diana</span>
    </div>

  </div>


  <h2 class="section-title">
    Сообщения
  </h2>


  <div class="chat-list">

    <div class="chat">

      <div class="avatar">
        A
      </div>

      <div class="chat-info">

        <h3>Alex</h3>

        <p>Привет 👋</p>

      </div>

      <span>12:45</span>

    </div>


    <div class="chat">

      <div class="avatar">
        M
      </div>

      <div class="chat-info">

        <h3>Max</h3>

        <p>Как дела?</p>

      </div>

      <span>11:20</span>

    </div>


    <div class="chat">

      <div class="avatar">
        D
      </div>

      <div class="chat-info">

        <h3>Diana</h3>

        <p>Фото 📷</p>

      </div>

      <span>09:15</span>

    </div>

  </div>

</div>

</body>
</html>
